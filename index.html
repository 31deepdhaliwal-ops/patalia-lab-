<style>
  :root {
    --bg: #f9f8f6; --bg-2: #eeebe3;
    --ink: #18181b; --ink-2: #27272a;
    --muted: #71717a; --line: #18181b; --hairline: #e4e4e7;
    --accent: #9f1239; --accent-soft: #fff1f2;
    --abnormal-low: #1d4ed8;
    --good: #15803d; --paper: #fefce8;
  }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--ink); }
  body { font-family: 'Geist', system-ui, sans-serif; font-feature-settings: "ss01", "cv11"; }
  .display { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', 'Menlo', monospace; font-feature-settings: "tnum", "ss02"; font-variant-numeric: tabular-nums; }
  .smallcaps { font-variant-caps: all-small-caps; letter-spacing: 0.1em; font-weight: 600; }
  .hairline { height: 1px; background: var(--hairline); }
  .hairline-strong { height: 1px; background: var(--line); }

  .field-input {
    background: transparent; border: 0; border-bottom: 2px solid var(--hairline);
    padding: 0.625rem 0; color: var(--ink); width: 100%; outline: none;
    transition: border-color 150ms ease; font-size: 1rem; min-height: 46px;
  }
  .field-input:focus { border-bottom-color: var(--accent); }

  .btn-primary {
    background: var(--accent); color: #fff; padding: 0.75rem 1.5rem;
    font-weight: 600; font-size: 0.875rem; letter-spacing: 0.02em;
    transition: opacity 150ms; min-height: 46px;
    display: inline-flex; align-items: center;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { opacity: 0.7; }
  .btn-primary:disabled { background: var(--hairline); color: var(--muted); cursor: not-allowed; opacity: 1; }

  .btn-ghost {
    background: transparent; color: var(--ink); border: 1.5px solid var(--hairline);
    padding: 0.625rem 1rem; font-weight: 500; font-size: 0.8125rem;
    transition: border-color 150ms, background 150ms; min-height: 46px;
    display: inline-flex; align-items: center;
  }
  .btn-ghost:hover { border-color: var(--ink); background: var(--bg-2); }

  .tab-link {
    padding: 0.625rem 1rem; font-size: 0.875rem; color: var(--muted);
    border-bottom: 2px solid transparent; transition: color 150ms, border-color 150ms;
    font-weight: 500; white-space: nowrap;
  }
  .tab-link:hover { color: var(--ink); }
  .tab-link.active { color: var(--ink); border-bottom-color: var(--accent); }

  .result-row {
    display: grid;
    grid-template-columns: 1fr 96px 108px 28px;
    align-items: center; gap: 0.75rem;
    padding: 0.5rem 0; border-bottom: 1px solid var(--hairline);
  }
  .result-row.indent { padding-left: 1.25rem; }
  .result-row.section-header { padding: 1rem 0 0.375rem 0; border-bottom: 2px solid var(--ink); }
  @media (max-width: 639px) {
    .result-row { grid-template-columns: 1fr 88px 26px; gap: 0.5rem; }
    .result-range { display: none; }
  }

  .result-input {
    background: transparent; border: 1px solid transparent; outline: none;
    text-align: right; width: 100%; font-family: 'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums; font-size: 1rem; color: var(--ink);
    padding: 0.375rem 0.5rem; transition: all 150ms; min-height: 40px;
  }
  .result-input:focus { border-color: var(--accent); background: var(--bg-2); }

  .flag-h { color: var(--accent); font-weight: 700; }
  .flag-l { color: var(--abnormal-low); font-weight: 700; }
  .report-num { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; color: var(--muted); }

  @keyframes fade-rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { animation: fade-rise 240ms ease-out both; }
  .scrim { background: rgba(24,24,27,0.6); backdrop-filter: blur(4px); }

  .focus-ring:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    border: 1px solid var(--accent); font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;

    display: none;

    background: var(--bg); border-top: 1px solid var(--hairline);

    .mobile-save-bar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }

  }

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 99px; }

// Only the input parameters (not section headers)
const INPUT_PARAMS = PARAMS.filter(p => !p.section);

// Format a value for display based on its display type
const formatValue = (val, displayType) => {
  if (val === "" || val == null || isNaN(+val)) return "—";
  const v = +val;
  switch (displayType) {
    case "integer": return String(Math.round(v));
    case "decimal": return v.toFixed(1);
    case "decimal2": return v.toFixed(2);
    case "decimal3": return v.toFixed(3);
    default: return String(v);
  }
}

const rangeFor = (paramKey, age, gender) => {
  const p = INPUT_PARAMS.find(x => x.key === paramKey);
  if (!p) return null;
  const a = +age || 30;
  const g = gender === "F" ? "F" : "M";
  const row = p.ranges.find(r => a >= r.ageMin && a < r.ageMax) || p.ranges[p.ranges.length - 1];
  if (!row) return null;
  const [min, max] = row[g];
  return { min, max };
};

const formatRange = (paramKey, age, gender, displayType) => {
  // Show gender-specific range label only when M and F differ (HGB, RBC)
  const p = INPUT_PARAMS.find(x => x.key === paramKey);
  if (!p) return "";
  const a = +age || 30;
  const row = p.ranges.find(r => a >= r.ageMin && a < r.ageMax) || p.ranges[p.ranges.length - 1];
  if (!row) return "";
  const [mMin, mMax] = row.M;
  const [fMin, fMax] = row.F;
  const fmt = (n) => {
    if (displayType === "integer") return String(Math.round(n));
    if (displayType === "decimal3") return n.toFixed(3);
    if (displayType === "decimal2") return n.toFixed(2);
    return n.toFixed(1);
  };
  if (mMin === fMin && mMax === fMax) {
    return `${fmt(mMin)} – ${fmt(mMax)}`;
  } else {
    if (gender === "F") return `F=${fmt(fMin)}-${fmt(fMax)}`;
    return `M=${fmt(mMin)}-${fmt(mMax)}`;
  }
};

const flagOf = (paramKey, val, age, gender) => {
  if (val === "" || val == null || isNaN(+val)) return "";
  const p = INPUT_PARAMS.find(x => x.key === paramKey);
  if (!p || p.skipFlag) return "";
  const r = rangeFor(paramKey, age, gender);
  if (!r) return "";
  const v = +val;
  if (v < r.min) return "L";
  if (v > r.max) return "H";
  return "";
};

// ====== Hooks ======
const useSupabaseConfig = () => {
  const [cfg, setCfg] = useState(() => { try { return JSON.parse(localStorage.getItem(SUPA_KEY) || "{}"); } catch { return {}; } });
  const effective = useMemo(
    () => (cfg.url && cfg.anonKey) ? cfg : (SUPA_URL && SUPA_ANON_KEY ? { url: SUPA_URL, anonKey: SUPA_ANON_KEY } : cfg),
    [cfg]
  );
  return {
    cfg: effective,
    save: (c) => { setCfg(c); localStorage.setItem(SUPA_KEY, JSON.stringify(c)); },
    clear: () => { setCfg({}); localStorage.removeItem(SUPA_KEY); }
  };
};
const buildSupabaseClient = (cfg) => {
  if (!cfg?.url || !cfg?.anonKey) return null;
  try { return createClient(cfg.url, cfg.anonKey); } catch { return null; }
};

const useReports = (supabase) => {
  const [reports, setReports] = useState(() => { try { return JSON.parse(localStorage.getItem(REPORTS_KEY) || "[]"); } catch { return []; }});
  const [loading, setLoading] = useState(false);
  const [syncError, setSyncError] = useState("");
  const [lastSync, setLastSync] = useState(null);
  useEffect(() => { try { localStorage.setItem(REPORTS_KEY, JSON.stringify(reports)); } catch {} }, [reports]);

  const refresh = useCallback(async () => {
    if (!supabase) return;
    setLoading(true); setSyncError("");
    try {
      const { data, error } = await supabase.from("reports").select("*").order("created_at", { ascending: false }).limit(500);
      if (error) throw error;
      const mapped = (data || []).map(r => ({
        id: r.report_no, cloudId: r.id, patient: r.patient_snapshot, values: r.values,
        createdAt: r.created_at, editedAt: r.edited_at,
      }));
      setReports(mapped); setLastSync(new Date());
    } catch (e) { setSyncError(e?.message || String(e)); }
    finally { setLoading(false); }
  }, [supabase]);

  useEffect(() => { if (supabase) refresh(); }, [supabase, refresh]);

  const addReport = async (report) => {
    if (supabase) {
      let patientId = null;
      try {
        if (report.patient.phone) {
          const { data: existing } = await supabase.from("patients").select("id").eq("phone", report.patient.phone).maybeSingle();
          if (existing) {
            patientId = existing.id;
            await supabase.from("patients").update({ name: report.patient.name, age: +report.patient.age || null, gender: report.patient.gender }).eq("id", patientId);
          } else {
            const { data: created } = await supabase.from("patients").insert({ name: report.patient.name, phone: report.patient.phone, age: +report.patient.age || null, gender: report.patient.gender }).select("id").single();
            patientId = created?.id;
          }
        } else {
          const { data: created } = await supabase.from("patients").insert({ name: report.patient.name, age: +report.patient.age || null, gender: report.patient.gender }).select("id").single();
          patientId = created?.id;
        }
        const { data, error } = await supabase.from("reports").insert({ report_no: report.id, patient_id: patientId, patient_snapshot: report.patient, values: report.values }).select("*").single();
        if (error) throw error;
        const newReport = { id: data.report_no, cloudId: data.id, patient: data.patient_snapshot, values: data.values, createdAt: data.created_at, editedAt: data.edited_at };
        setReports(prev => [newReport, ...prev]);
        return newReport;
      } catch (e) {
        setSyncError(e?.message || String(e));
        setReports(prev => [report, ...prev]);
        return report;
      }
    } else {
      setReports(prev => [report, ...prev]);
      return report;
    }
  };

  const updateReport = async (id, patch) => {
    const target = reports.find(r => r.id === id);
    if (!target) return;
    const updated = { ...target, ...patch, editedAt: new Date().toISOString() };
    if (supabase && target.cloudId) {
      try {
        const { error } = await supabase.from("reports").update({ patient_snapshot: updated.patient, values: updated.values, edited_at: updated.editedAt }).eq("id", target.cloudId);
        if (error) throw error;
      } catch (e) { setSyncError(e?.message || String(e)); }
    }
    setReports(prev => prev.map(r => r.id === id ? updated : r));
    return updated;
  };

  const deleteReport = async (id) => {
    const target = reports.find(r => r.id === id);
    if (supabase && target?.cloudId) {
      try { const { error } = await supabase.from("reports").delete().eq("id", target.cloudId); if (error) throw error; }
      catch (e) { setSyncError(e?.message || String(e)); }
    }
    setReports(prev => prev.filter(r => r.id !== id));
  };

  const getPatientHistory = useCallback(async (phone) => {
    if (!supabase || !phone) return [];
    try {
      const { data: patient } = await supabase.from("patients").select("id").eq("phone", phone).maybeSingle();
      if (!patient) return [];
      const { data, error } = await supabase.from("reports").select("*").eq("patient_id", patient.id).order("created_at", { ascending: false });
      if (error) throw error;
      return (data || []).map(r => ({ id: r.report_no, cloudId: r.id, patient: r.patient_snapshot, values: r.values, createdAt: r.created_at, editedAt: r.edited_at }));
    } catch { return []; }
  }, [supabase]);

  return { reports, loading, syncError, lastSync, addReport, updateReport, deleteReport, refresh, getPatientHistory, isCloud: !!supabase };
};

// ====== Gemini (via server proxy — key stays in Vercel env) ======
const callGemini = async (_key, dataUrl) => {
  const base64 = dataUrl.split(",")[1];
  const mimeMatch = dataUrl.match(/^data:(image\/[a-z+]+);/i);
  const mime = mimeMatch ? mimeMatch[1] : "image/jpeg";
  let res;
  try {
    res = await fetch("/api/scan", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ base64, mime })
    });
  } catch (e) { throw new Error(`Network error: ${e?.message || e}`); }
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error || `Scan failed (${res.status})`);
  const text = data.text;
  if (!text) throw new Error("Empty response from server");
  let parsed;
  try { parsed = JSON.parse(text); }
  catch { parsed = JSON.parse(text.replace(/```json|```/g, "").trim()); }
  const values = {};
  for (const p of INPUT_PARAMS) {
    const v = parsed[p.key];
    if (v != null && !isNaN(+v)) values[p.key] = +v;
  }
  return { values, raw: text };
};

// ====== PDF — content only, no header/footer (pre-printed letterhead) ======
const generatePDF = (report, lab) => {
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const W = 210, H = 297;
  const ML = 16, MR = 16;           // left / right margin
  const MT = 48;                     // top blank space for pre-printed header
  const MB = 32;                     // bottom blank space for pre-printed footer
  const RED = [155, 25, 30], BLUE = [29, 78, 216], DARK = [20, 20, 20], GREY = [100, 100, 100];
  const dateStr = new Date(report.createdAt).toLocaleDateString("en-IN", { day: "2-digit", month: "long", year: "numeric" });
  let y = MT;

  // ── PATIENT INFO ──────────────────────────────────────────────────
  // thin top rule
  doc.setDrawColor(...DARK); doc.setLineWidth(0.5); doc.line(ML, y, W - MR, y);
  y += 6;

  // Two-column patient fields
  const LC = ML, VC = ML + 34, RC = W / 2 + 4, RV = W / 2 + 34;
  const field = (lbl, val, lx, vx) => {
    doc.setFont("helvetica", "normal"); doc.setFontSize(8.5); doc.setTextColor(...GREY);
    doc.text(lbl, lx, y);
    doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(...DARK);
    doc.text(String(val || "—"), vx, y);
  };

  field("Patient Name", report.patient.name, LC, VC);
  field("Sex", { M: "Male", F: "Female", O: "Other" }[report.patient.gender] || "—", RC, RV);
  y += 7;
  field("Referred by Dr.", report.patient.refBy || "—", LC, VC);
  field("Age", report.patient.age ? `${report.patient.age} Years` : "—", RC, RV);
  y += 7;
  field("Lab Ref. No.", report.id, LC, VC);
  field("Date", dateStr, RC, RV);
  y += 8;

  doc.setDrawColor(...DARK); doc.setLineWidth(0.5); doc.line(ML, y, W - MR, y);
  y += 7;

  // ── REPORT TITLE ─────────────────────────────────────────────────
  doc.setFont("times", "bold"); doc.setFontSize(15); doc.setTextColor(...DARK);
  doc.text("HAEMATOLOGICAL REPORT", W / 2, y, { align: "center" });
  y += 7;

  // ── TABLE ─────────────────────────────────────────────────────────
  const cInv    = ML + 1;   // investigation name (left)
  const cResult = 93;       // result (right-aligned)
  const cFlag   = 107;      // ▲▼ (centred)
  const cRange  = 122;      // normal range (left)
  const cUnit   = W - MR;   // unit (right-aligned)
  const ROW_H   = 7.2;
  const HDR_H   = 10;

  // Header row
  doc.setFillColor(...RED);
  doc.rect(ML, y - 6.5, W - ML - MR, HDR_H, "F");
  doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(9.5);
  doc.text("INVESTIGATION",  cInv,    y);
  doc.text("RESULT",         cResult, y, { align: "right" });
  doc.text("FLAG",           cFlag,   y, { align: "center" });
  doc.text("NORMAL RANGE",   cRange,  y);
  doc.text("UNIT",           cUnit,   y, { align: "right" });
  y += ROW_H + 2;

  const fmtNum = (n, d) => d === "integer" ? String(Math.round(n)) : d === "decimal3" ? n.toFixed(3) : d === "decimal2" ? n.toFixed(2) : n.toFixed(1);

  let firstRow = true;
  let prevWasSection = false;
  for (const p of PARAMS) {
    // row separator (skip after header row and after section subheaders)
    if (!firstRow && !prevWasSection) { doc.setDrawColor(210, 205, 200); doc.setLineWidth(0.2); doc.line(ML, y - ROW_H + 2.5, W - MR, y - ROW_H + 2.5); }
    firstRow = false;
    prevWasSection = false;

    if (p.section) {
      prevWasSection = true;
      y += 2;
      doc.setFillColor(235, 230, 222);
      doc.rect(ML, y - 5, W - ML - MR, 6.5, "F");
      doc.setFont("helvetica", "bold"); doc.setFontSize(9.5); doc.setTextColor(...DARK);
      doc.text("DIFFERENTIAL LEUCOCYTE COUNT (DLC)", cInv, y);
      y += ROW_H + 2;
      continue;
    }

    const v    = report.values[p.key];
    const flag = flagOf(p.key, v, report.patient.age, report.patient.gender);
    const isH  = flag === "H", isL = flag === "L";

    // name
    doc.setFont("helvetica", "normal"); doc.setFontSize(10.5); doc.setTextColor(...DARK);
    doc.text(p.label, p.indent ? cInv + 6 : cInv, y);

    // result
    doc.setFont("helvetica", "bold"); doc.setFontSize(11);
    doc.setTextColor(...(isH ? RED : isL ? BLUE : DARK));
    doc.text(formatValue(v, p.display), cResult, y, { align: "right" });

    // flag triangle
    if (isH) { doc.setFillColor(...RED);  doc.triangle(cFlag, y - 4, cFlag - 2.5, y + 0.8, cFlag + 2.5, y + 0.8, "F"); }
    if (isL) { doc.setFillColor(...BLUE); doc.triangle(cFlag, y + 0.8, cFlag - 2.5, y - 4, cFlag + 2.5, y - 4, "F"); }

    // range
    const ageRow = p.ranges.find(r => +report.patient.age >= r.ageMin && +report.patient.age < r.ageMax) || p.ranges[p.ranges.length - 1];
    if (ageRow) {
      const { M: mR, F: fR } = ageRow;
      const g = report.patient.gender;
      doc.setFont("helvetica", "normal"); doc.setFontSize(9.5); doc.setTextColor(...GREY);
      if (g === "M" || g === "F") {
        const [mn, mx] = g === "M" ? mR : fR;
        doc.text(`${fmtNum(mn, p.display)} - ${fmtNum(mx, p.display)}`, cRange, y);
      } else if (mR[0] === fR[0] && mR[1] === fR[1]) {
        doc.text(`${fmtNum(mR[0], p.display)} - ${fmtNum(mR[1], p.display)}`, cRange, y);
      } else {
        doc.setFontSize(8);
        doc.text(`M: ${fmtNum(mR[0],p.display)}-${fmtNum(mR[1],p.display)}   F: ${fmtNum(fR[0],p.display)}-${fmtNum(fR[1],p.display)}`, cRange, y);
      }
    }

    // unit
    doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(130, 130, 130);
    doc.text(p.unit, cUnit, y, { align: "right" });

    doc.setTextColor(...DARK);
    y += ROW_H;
  }

  // closing rule
  doc.setDrawColor(210, 205, 200); doc.setLineWidth(0.3);
  doc.line(ML, y - ROW_H + 2.5, W - MR, y - ROW_H + 2.5);
  y += 8;

  // ── SIGNATURE ────────────────────────────────────────────────────
  doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(...DARK);
  doc.text(lab.signatoryName || "Authorised Signatory", W - MR, y, { align: "right" });
  if (lab.signatoryQual) {
    y += 5;
    doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(...GREY);
    doc.text(lab.signatoryQual, W - MR, y, { align: "right" });
  }

  return doc;
};

  const [scanImage, setScanImage] = useState(null);
  const [scanStatus, setScanStatus] = useState("");
  const [scanResult, setScanResult] = useState(null);
  const [scanError, setScanError] = useState("");
  const fileRef = useRef(null);
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);

  useEffect(() => {
    if (!supabase || !patient.phone || patient.phone.length !== 10 || editingId) { setPatientHistory([]); return; }
    let cancelled = false;
    store.getPatientHistory(patient.phone).then(h => { if (!cancelled) setPatientHistory(h); });

  }, [patient.phone, supabase, editingId]);

  const filtered = useMemo(() => {

    if (!q) return store.reports;
    return store.reports.filter(r => r.patient.name.toLowerCase().includes(q) || (r.patient.phone || "").includes(q) || r.id.toLowerCase().includes(q));
  }, [query, store.reports]);

  const canSave = patient.name.trim() && INPUT_PARAMS.every(p => values[p.key] !== "" && !isNaN(+values[p.key]));
  const flaggedCount = useMemo(() => INPUT_PARAMS.filter(p => flagOf(p.key, values[p.key], patient.age, patient.gender)).length, [values, patient.age, patient.gender]);

  const startEdit = (report) => {
    setEditingId(report.id);
    setPatient({ refBy: "", ...report.patient });
    setValues(Object.fromEntries(INPUT_PARAMS.map(p => [p.key, String(report.values[p.key] ?? "")])));

  };
  const cancelEdit = () => {
    setEditingId(null);
    setPatient({ name: "", age: "", gender: "M", phone: "", refBy: "" });
    setValues(Object.fromEntries(INPUT_PARAMS.map(p => [p.key, p.key === "OTHER" ? "0" : ""])));
    setSaveAttempted(false);
  };

  const fillTestData = () => {
    setPatient({ name: "Harjinder Singh", age: "42", gender: "M", phone: "9814233567", refBy: "Dr. Gurpreet Kaur" });
    setValues({
      HGB: "11.2", TLC: "11.8", NEUT: "74", LYMPH: "18", MONO: "5", EOS: "2", BASO: "0", OTHER: "0",
      RBC: "3.85", HCT: "34.1", MCV: "88.6", MCH: "29.1", MCHC: "32.8", RDW_CV: "15.9", RDW_SV: "48.2",
      PLT: "412", MPV: "9.3", PDW: "12.1", PCT: "0.38"
    });
    setSaveAttempted(false);
  };

  const handleSave = async () => {
    if (editingId) {
      const updated = await store.updateReport(editingId, {
        patient: { ...patient },
        values: Object.fromEntries(INPUT_PARAMS.map(p => [p.key, +values[p.key]])),
      });
      setJustSaved(updated); setEditingId(null);
    } else {
      const newReport = {
        id: nextId(store.reports),
        patient: { ...patient },
        values: Object.fromEntries(INPUT_PARAMS.map(p => [p.key, +values[p.key]])),
        createdAt: new Date().toISOString(),
      };
      const saved = await store.addReport(newReport);
      setJustSaved(saved);
    }
    setPatient({ name: "", age: "", gender: "M", phone: "", refBy: "" });
    setValues(Object.fromEntries(INPUT_PARAMS.map(p => [p.key, p.key === "OTHER" ? "0" : ""])));
    setPatientHistory([]); setSaveAttempted(false);
  };

  const fillFromPrevious = (prev) => setPatient({ refBy: "", ...prev.patient });

  const runScan = async (dataUrl) => {
    if (!apiKey.key) { setScanError("Add your Gemini key in Settings."); setScanStatus("error"); return; }
    setScanStatus("running"); setScanError("");
    try {
      const result = await callGemini(apiKey.key, dataUrl);
      setScanResult(result); setScanStatus("done");
    } catch (e) { setScanError(e?.message || String(e)); setScanStatus("error"); }
  };

  const onFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { setScanImage(e.target.result); runScan(e.target.result); };
    reader.readAsDataURL(file);
  };
  const startCamera = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
    } catch { alert("Camera unavailable."); setScanMode(null); }
  };
  const stopCamera = () => { if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }};
  const captureFrame = () => {
    const v = videoRef.current, c = canvasRef.current;
    if (!v || !c) return;
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext("2d").drawImage(v, 0, 0);
    const url = c.toDataURL("image/jpeg", 0.92);
    setScanImage(url); stopCamera(); runScan(url);
  };
  useEffect(() => {
    if (scanMode === "camera" && scanOpen && !scanImage) startCamera();
    return () => { if (scanMode === "camera") stopCamera(); };
  }, [scanMode, scanOpen]);

  const closeScan = () => {
    stopCamera();
    setScanOpen(false); setScanMode(null); setScanImage(null);
    setScanResult(null); setScanStatus(""); setScanError("");
  };
  const applyScanResult = () => {

                return h("div", { key: p.key, className: "flex justify-between py-2 border-b text-sm", style: { borderColor: "var(--hairline)" } },
                  h("span", null, p.label),
                  h("span", { className: "mono", style: { color: v != null ? "var(--ink)" : "var(--accent)" } },
                    v != null ? formatValue(v, p.display) : "—"));
              })))
        )
      ),
      scanStatus === "done" && h("div", { className: "px-6 py-4 flex justify-end gap-2 border-t", style: { background: "var(--bg-2)", borderColor: "var(--line)" } },
        h("button", { onClick: closeScan, className: "btn-ghost" }, "Cancel"),
        h("button", { onClick: applyScanResult, className: "btn-primary" }, "Use these values"))
    )
  );
}

function SettingsModal({ apiKey, labCfg, supaCfg, store, onClose }) {
  const [keyDraft, setKeyDraft] = useState(apiKey.key);
  const [showKey, setShowKey] = useState(false);
  const [labDraft, setLabDraft] = useState(labCfg.lab);
  const [supaDraft, setSupaDraft] = useState({ url: supaCfg.cfg.url || "", anonKey: supaCfg.cfg.anonKey || "" });
  const [showSupaKey, setShowSupaKey] = useState(false);
  const [section, setSection] = useState("lab");
  const [testStatus, setTestStatus] = useState("");

  const onLogoFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => setLabDraft({ ...labDraft, logoDataUrl: e.target.result });
    reader.readAsDataURL(file);
  };

  const testConnection = async () => {
    setTestStatus("testing");
    try {
      const client = createClient(supaDraft.url, supaDraft.anonKey);
      const { error } = await client.from("reports").select("id").limit(1);
      if (error) throw error;
      setTestStatus("ok");
    } catch (e) { setTestStatus("fail:" + (e?.message || e)); }
  };

  return h("div", { className: "fixed inset-0 scrim flex items-end sm:items-center justify-center z-50 p-2 sm:p-4" },
    h("div", { className: "max-w-2xl w-full max-h-[92vh] overflow-hidden flex flex-col reveal", style: { background: "var(--bg)", border: "1px solid var(--line)" } },
      h("div", { className: "px-6 py-5 flex items-center justify-between border-b", style: { borderColor: "var(--line)" } },
        h("div", null,
          h("div", { className: "smallcaps text-[10px]", style: { color: "var(--muted)" } }, "Configuration"),
          h("h3", { className: "display text-xl mt-0.5" }, "Settings")),
        h("button", { onClick: onClose, className: "p-1", style: { color: "var(--muted)" } }, h(Icon, { d: I.x }))),
      h("div", { className: "flex border-b overflow-x-auto", style: { borderColor: "var(--hairline)" } },
        ["lab", "scanning", "cloud", "backup"].map(s =>
          h("button", { key: s, onClick: () => setSection(s),
            className: `px-5 py-3 text-xs whitespace-nowrap transition ${section===s ? "font-semibold" : ""}`,
            style: { color: section === s ? "var(--ink)" : "var(--muted)", borderBottom: section === s ? "2px solid var(--ink)" : "2px solid transparent", marginBottom: "-1px" } },
            { lab: "Lab branding", scanning: "Scanning", cloud: "Cloud database", backup: "Backup" }[s]))),

      h("div", { className: "p-6 overflow-y-auto flex-1 space-y-5" },
        section === "lab" && h(React.Fragment, null,
          h(Field, { label: "Lab name (uppercase preferred)" },
            h("input", { value: labDraft.name, onChange: e => setLabDraft({ ...labDraft, name: e.target.value }), className: "field-input display text-lg" })),
          h("div", { className: "grid grid-cols-2 gap-5" },
            h(Field, { label: "Short name (logo)" },
              h("input", { value: labDraft.short, onChange: e => setLabDraft({ ...labDraft, short: e.target.value }), className: "field-input mono", placeholder: "PCL" })),
            h(Field, { label: "Branch" },
              h("input", { value: labDraft.branch, onChange: e => setLabDraft({ ...labDraft, branch: e.target.value }), className: "field-input" }))),
          h(Field, { label: "Tagline (top-right ribbon)" },
            h("input", { value: labDraft.tagline, onChange: e => setLabDraft({ ...labDraft, tagline: e.target.value }), className: "field-input", placeholder: "FULLY COMPUTERISED LAB" })),
          h(Field, { label: "Address" },
            h("input", { value: labDraft.address, onChange: e => setLabDraft({ ...labDraft, address: e.target.value }), className: "field-input" })),
          h("div", { className: "grid grid-cols-1 sm:grid-cols-2 gap-5" },
            h(Field, { label: "Phone" },
              h("input", { value: labDraft.phone, onChange: e => setLabDraft({ ...labDraft, phone: e.target.value }), className: "field-input mono" })),
            h(Field, { label: "WhatsApp country code" },
              h("input", { value: labDraft.whatsappCountryCode, onChange: e => setLabDraft({ ...labDraft, whatsappCountryCode: e.target.value.replace(/\D/g,"") }), className: "field-input mono", placeholder: "91" }))),
          h("div", { className: "grid grid-cols-1 sm:grid-cols-2 gap-5" },
            h(Field, { label: "Signatory name" },
              h("input", { value: labDraft.signatoryName, onChange: e => setLabDraft({ ...labDraft, signatoryName: e.target.value }), className: "field-input" })),
            h(Field, { label: "Qualification" },
              h("input", { value: labDraft.signatoryQual, onChange: e => setLabDraft({ ...labDraft, signatoryQual: e.target.value }), className: "field-input", placeholder: "MBBS, MD" }))),
          h(Field, { label: "Equipment line (footer)", hint: "Shown on bottom-right of PDF" },
            h("input", { value: labDraft.equipment, onChange: e => setLabDraft({ ...labDraft, equipment: e.target.value }), className: "field-input text-sm" })),
          h(Field, { label: "Jurisdiction (red footer)" },
            h("input", { value: labDraft.jurisdiction, onChange: e => setLabDraft({ ...labDraft, jurisdiction: e.target.value }), className: "field-input" })),
          h("div", null,
            h("div", { className: "smallcaps text-[10px] mb-3", style: { color: "var(--muted)" } }, "Lab logo"),
            h("div", { className: "flex items-center gap-4" },
              labDraft.logoDataUrl
                ? h("img", { src: labDraft.logoDataUrl, alt: "logo", className: "w-16 h-16 object-contain", style: { background: "var(--bg-2)", border: "1px solid var(--hairline)" }})
                : h("div", { className: "w-16 h-16 flex items-center justify-center text-xs", style: { background: "var(--bg-2)", border: "1px dashed var(--hairline)", color: "var(--muted)" } }, "—"),
              h("label", { className: "btn-ghost cursor-pointer" }, "Upload",
                h("input", { type: "file", accept: "image/*", className: "hidden", onChange: e => onLogoFile(e.target.files?.[0]) })),
              labDraft.logoDataUrl && h("button", { onClick: () => setLabDraft({ ...labDraft, logoDataUrl: "" }),
                className: "text-xs underline", style: { color: "var(--accent)" } }, "Remove")))
        ),

        section === "scanning" && h(React.Fragment, null,
          apiKey.isBuiltIn
            ? h("div", { className: "p-4", style: { background: "#e8f0e9", borderLeft: "2px solid var(--good)" } },
                h("div", { className: "smallcaps text-[10px]", style: { color: "var(--good)" } }, "Gemini key"),
                h("div", { className: "text-sm mt-1" }, "Built-in key active — photo scanning ready."),
                h("div", { className: "mono text-xs mt-2", style: { color: "var(--muted)" } }, apiKey.key.slice(0, 14) + "…"))
            : h(React.Fragment, null,
                h("div", { className: "space-y-2" },
                  h("div", { className: "smallcaps text-[10px]", style: { color: "var(--muted)" } }, "Gemini API key"),
                  h("p", { className: "text-sm" }, "Custom key overrides the built-in one."),
                  h("a", { href: "https://aistudio.google.com/apikey", target: "_blank", rel: "noopener noreferrer",
                    className: "inline-flex items-center gap-1 text-xs underline" }, "Get a key ", h(Icon, { d: I.link, className: "w-3 h-3" }))),
                h("div", { className: "flex items-center" },
                  h("input", { type: showKey ? "text" : "password", value: keyDraft,
                    onChange: e => setKeyDraft(e.target.value), placeholder: "AIzaSy…",
                    className: "field-input mono", autoCapitalize: "off", autoCorrect: "off", spellCheck: false }),
                  h("button", { onClick: () => setShowKey(!showKey), className: "px-2", style: { color: "var(--muted)" } },
                    h(Icon, { d: showKey ? I.eyeOff : I.eye }))),
                h("button", { onClick: () => { apiKey.clear(); setKeyDraft(GEMINI_KEY); },
                  className: "text-xs underline", style: { color: "var(--accent)" } }, "Reset to built-in key"))
        ),

        section === "cloud" && h(React.Fragment, null,
          h("div", { className: "p-4", style: { background: "var(--bg-2)", borderLeft: `2px solid ${store.isCloud ? "var(--good)" : "var(--muted)"}` } },
            h("div", { className: "smallcaps text-[10px]", style: { color: "var(--muted)" } }, "Status"),
            h("div", { className: "text-sm mt-1" },
              store.isCloud ? `Synced — ${store.reports.length} reports loaded from cloud.` : "Reports save locally only.")),
          h(Field, { label: "Project URL", hint: "From Project Settings → API" },
            h("input", { value: supaDraft.url, onChange: e => setSupaDraft({ ...supaDraft, url: e.target.value.trim() }),
              placeholder: "https://xxxxxxxxxxx.supabase.co", className: "field-input mono",
              autoCapitalize: "off", autoCorrect: "off", spellCheck: false })),
          h(Field, { label: "Anon (public) key", hint: "Public by design — security comes from your RLS rules" },
            h("div", { className: "flex items-center" },
              h("input", { type: showSupaKey ? "text" : "password", value: supaDraft.anonKey,
                onChange: e => setSupaDraft({ ...supaDraft, anonKey: e.target.value.trim() }),
                placeholder: "eyJhbGciOi…", className: "field-input mono",
                autoCapitalize: "off", autoCorrect: "off", spellCheck: false }),
              h("button", { onClick: () => setShowSupaKey(!showSupaKey), className: "px-2", style: { color: "var(--muted)" } },
                h(Icon, { d: showSupaKey ? I.eyeOff : I.eye })))),
          h("div", { className: "flex gap-2" },
            h("button", { onClick: testConnection,
              disabled: !supaDraft.url || !supaDraft.anonKey || testStatus === "testing",
              className: "btn-ghost" }, testStatus === "testing" ? "Testing…" : "Test connection"),
            supaCfg.cfg.url && h("button", { onClick: () => { supaCfg.clear(); setSupaDraft({ url: "", anonKey: "" }); },
              className: "text-xs underline self-center", style: { color: "var(--accent)" } }, "Disconnect")),
          testStatus === "ok" && h("div", { className: "p-3 text-sm",
            style: { background: "#e8f0e9", color: "var(--good)", borderLeft: "2px solid var(--good)" } },
            "✓ Connection successful. Save to activate."),
          testStatus.startsWith("fail:") && h("div", { className: "p-3 text-sm",
            style: { background: "var(--accent-soft)", color: "var(--accent)", borderLeft: "2px solid var(--accent)" } },
            h("div", { className: "smallcaps text-[10px] mb-1" }, "Failed"),
            h("div", { className: "mono text-xs break-all" }, testStatus.slice(5)))
        ),

        section === "backup" && h(React.Fragment, null,
          h("div", { className: "p-4", style: { background: "var(--bg-2)" } },
            h("div", { className: "smallcaps text-[10px]", style: { color: "var(--muted)" } }, "Storage"),
            h("div", { className: "display text-2xl mt-1" }, store.reports.length, h("span", { className: "text-base font-normal ml-2" }, "reports")),
            h("p", { className: "text-xs mt-2", style: { color: "var(--muted)" } },
              store.isCloud ? "In cloud + cached locally" : "On this device only — backup regularly")),
          h("button", { onClick: () => exportAllData(store.reports, labDraft),
            className: "btn-primary flex items-center gap-2" },
            h(Icon, { d: I.download, className: "w-4 h-4" }), "Export backup (.json)")
        )
      ),

      h("div", { className: "px-6 py-4 flex justify-end gap-2 border-t", style: { background: "var(--bg-2)", borderColor: "var(--line)" } },
        h("button", { onClick: onClose, className: "btn-ghost" }, "Cancel"),
        h("button", { onClick: () => {
            apiKey.save(keyDraft.trim());
            labCfg.save(labDraft);
            if (supaDraft.url && supaDraft.anonKey) supaCfg.save({ url: supaDraft.url, anonKey: supaDraft.anonKey });
            onClose();
          }, className: "btn-primary" }, "Save"))
    )
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
